name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 12 hours
  workflow_dispatch:  # Manual trigger if needed

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          curl -s https://loinc-codes-crosswalk-pl.streamlit.app/ > /dev/null
          echo "Pinged at $(date)"